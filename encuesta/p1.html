<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
            <form>

<div class="pregunta">
<label>1. ¿Cuál es tu nombre?</label><br>
<input type="text" name="nombre" required="">
</div>

<div class="pregunta">
<label>2. ¿Economicamente eres?</label><br>
<input type="radio" name="lenguaje"> Dependiente<br>
<input type="radio" name="lenguaje"> Semi-Dependiente<br>
<input type="radio" name="lenguaje"> Independiente<br>
</div>

<div class="pregunta">
<label>2. ¿Cuanto de dinero gastas para asistir al instituto?</label><br>
<input type="checkbox"> 1-5 bs<br>
<input type="checkbox"> 6-10 bs<br>
<input type="checkbox"> 11-20 bs<br>
<input type="checkbox"> 21-30 bs<br>
<input type="checkbox"> Otros<br>
</div>

<div class="pregunta">
<label>3. ¿Cuanto dispones para pasajes?</label><br>
<input type="checkbox"> 3-5 bs<br>
<input type="checkbox"> 10-20 bs<br>
<input type="checkbox"> 21-35 bs<br>
<input type="checkbox"> Otros<br>
</div>

<label>4. ¿Como llegas al intituto?</label><br>
<input type="radio" name="lenguaje"> A pie <br>
<input type="radio" name="lenguaje"> Transporte publico <br>
<input type="radio" name="lenguaje"> Movilidad propia<br>

<div class="pregunta">
<label>4. Deja un comentario:</label><br>
<textarea rows="4" cols="40"></textarea>
</div>

<button type="submit">Enviar Encuesta</button>

</body>
</html>
